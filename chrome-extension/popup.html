<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NeonFrame</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <span class="logo">◈ NeonFrame</span>
      <span class="badge">AI Generator</span>
    </header>

    <!-- Style selector -->
    <section class="section">
      <div class="label">Style</div>
      <div class="style-grid" id="styleGrid"></div>
      <p class="style-desc" id="styleDesc"></p>
    </section>

    <!-- Prompt -->
    <section class="section">
      <div class="label-row">
        <div class="label">Prompt</div>
        <span class="char-count" id="charCount">0/500</span>
      </div>
      <textarea id="prompt" placeholder="Describe the image you want to create..." rows="3" maxlength="500"></textarea>
      <p class="hint">Ctrl+Enter to generate</p>
    </section>

    <!-- Format -->
    <section class="section">
      <div class="label">Format</div>
      <div class="format-row" id="formatRow"></div>
    </section>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="random-btn" id="randomBtn">🎲</button>
      <button class="generate-btn" id="generateBtn">Generate image</button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap hidden" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Preview -->
    <div class="preview-wrap" id="previewWrap">
      <div class="preview-empty" id="previewEmpty">
        <span class="preview-icon" id="previewIcon">⚡</span>
        <p>Your image will appear here</p>
      </div>
      <img class="preview-img hidden" id="previewImg" alt="Generated image" />
    </div>

    <!-- Actions -->
    <div class="actions hidden" id="actions">
      <button class="action-btn" id="downloadBtn">↓ Download</button>
      <button class="action-btn" id="copyImgBtn">⎘ Copy image</button>
      <button class="action-btn accent" id="captionBtn">✨ Caption & Hashtags</button>
    </div>

    <!-- Caption result -->
    <div class="caption-result hidden" id="captionResult">
      <div class="caption-block">
        <div class="caption-header">
          <span class="caption-label">Caption</span>
          <button class="copy-small" id="copyCaptionBtn">Copy</button>
        </div>
        <p class="caption-text" id="captionText"></p>
      </div>
      <div class="caption-block">
        <div class="caption-header">
          <span class="caption-label">Hashtags</span>
          <button class="copy-small" id="copyHashtagsBtn">Copy all</button>
        </div>
        <div class="hashtags-wrap" id="hashtagsWrap"></div>
      </div>
    </div>

    <!-- Error -->
    <p class="error hidden" id="errorMsg"></p>

  </div>
  <script src="popup.js"></script>
</body>
</html>
